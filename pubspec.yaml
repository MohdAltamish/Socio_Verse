name: socio_verse
description: "A TikTok-style short video social app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.8.1

  # Video
  video_player: ^2.9.3
  chewie: ^1.8.5

  # Storage
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.4.3+1
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1

  # Picker
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  camera: ^0.10.5+9
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
